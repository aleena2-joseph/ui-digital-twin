<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings - Digital Twin Platform</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<!-- ═══ LUCIDE ICONS ═══ -->
<script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>

<!-- ═══ SIDEBAR STYLES ═══ -->
<link rel="stylesheet" href="../sidebar.css">

<style>
  /* ─── SAME VARIABLES AS INDEX ─── */
  :root {
    --bg-0: #0a0d12;
    --panel: rgba(20,26,34,0.55);
    --panel-solid: #121821;
    --panel-border: rgba(255,255,255,0.08);
    --panel-border-strong: rgba(255,255,255,0.14);
    --cyan: #06b6d4;
    --cyan-dim: rgba(6,182,212,0.16);
    --cyan-glow: rgba(6,182,212,0.4);
    --orange: #ff9a4d;
    --orange-dim: rgba(255,154,77,0.16);
    --red: #ff5c5c;
    --green: #22c55e;
    --green-bg: rgba(34,197,94,0.12);
    --orange-bg: rgba(255,154,77,0.12);
    --text-hi: #eef3f5;
    --text-mid: #9fb0bb;
    --text-low: #5e6e79;
    --line: rgba(255,255,255,0.06);
    --radius-lg: 20px;
    --radius-md: 14px;
    --radius-sm: 10px;
    --font-display: 'Space Grotesk', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
    --sidebar-w: 240px;
  }

  /* ── LIGHT THEME ── */
  [data-theme="light"] {
    --bg-0: #e8edf2;
    --panel: rgba(255,255,255,0.70);
    --panel-solid: #ffffff;
    --panel-border: rgba(0,0,0,0.06);
    --panel-border-strong: rgba(0,0,0,0.12);
    --text-hi: #0f172a;
    --text-mid: #475569;
    --text-low: #94a3b8;
    --line: rgba(0,0,0,0.06);
    --cyan: #0891b2;
    --cyan-dim: rgba(8,145,178,0.10);
    --cyan-glow: rgba(8,145,178,0.2);
  }

  [data-theme="light"] body {
    background:
      radial-gradient(ellipse 1200px 700px at 12% -10%, rgba(8,145,178,0.04), transparent 60%),
      radial-gradient(ellipse 900px 600px at 95% 10%, rgba(255,154,77,0.03), transparent 55%),
      linear-gradient(180deg, rgba(232,237,242,0.30) 0%, rgba(232,237,242,0.50) 100%),
      url("../assets/bg-whitey.png");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    background-repeat: no-repeat;
  }

  [data-theme="light"] .topbar {
    background: rgba(255,255,255,0.55);
    border-bottom: 1px solid rgba(0,0,0,0.06);
    backdrop-filter: blur(16px);
  }
  [data-theme="light"] .topbar::after {
    background: linear-gradient(90deg, transparent, rgba(8,145,178,0.10), transparent);
  }
  [data-theme="light"] .top-btn {
    background: rgba(255,255,255,0.6);
    border: 1px solid rgba(0,0,0,0.06);
    color: #475569;
  }
  [data-theme="light"] .top-btn:hover {
    background: rgba(255,255,255,0.9);
    color: #0f172a;
    border-color: rgba(0,0,0,0.1);
  }
  [data-theme="light"] .top-btn .date-text { color: #94a3b8; }
  [data-theme="light"] .admin-avatar {
    background: linear-gradient(135deg, #0891b2, #0d9488);
    color: #fff;
  }
  [data-theme="light"] .status-pill {
    color: #0891b2;
    background: rgba(8,145,178,0.08);
    border-color: rgba(8,145,178,0.15);
  }
  [data-theme="light"] .dot-live {
    background: #0891b2;
    box-shadow: 0 0 8px rgba(8,145,178,0.4);
  }

  [data-theme="light"] .settings-layout {
    background: rgba(255,255,255,0.70);
    border: 1px solid rgba(0,0,0,0.06);
    backdrop-filter: blur(20px);
    box-shadow: 0 4px 24px rgba(0,0,0,0.04), inset 0 1px 0 rgba(255,255,255,0.8);
  }
  [data-theme="light"] .settings-layout::before {
    background: linear-gradient(90deg, transparent, rgba(0,0,0,0.04), transparent);
  }
  [data-theme="light"] .settings-nav {
    background: rgba(255,255,255,0.40);
    border-right: 1px solid rgba(0,0,0,0.06);
  }
  [data-theme="light"] .settings-nav-item {
    color: #475569;
  }
  [data-theme="light"] .settings-nav-item:hover {
    background: rgba(0,0,0,0.04);
    color: #0f172a;
  }
  [data-theme="light"] .settings-nav-item.active {
    background: rgba(8,145,178,0.08);
    color: #0891b2;
    border-right-color: #0891b2;
  }
  [data-theme="light"] .settings-nav-item .nav-icon {
    color: #94a3b8;
  }
  [data-theme="light"] .settings-nav-item.active .nav-icon {
    color: #0891b2;
  }
  [data-theme="light"] .settings-nav-header {
    color: #94a3b8;
  }
  [data-theme="light"] .settings-content-header h2 {
    color: #0f172a;
  }
  [data-theme="light"] .settings-content-header p {
    color: #64748b;
  }
  [data-theme="light"] .settings-divider {
    border-color: rgba(0,0,0,0.06);
  }
  [data-theme="light"] .settings-section-title {
    color: #0f172a;
  }
  [data-theme="light"] .settings-label {
    color: #475569;
  }
  [data-theme="light"] .settings-description {
    color: #94a3b8;
  }
  [data-theme="light"] .settings-input,
  [data-theme="light"] .settings-select {
    background: rgba(255,255,255,0.90);
    color: #0f172a;
    border-color: rgba(0,0,0,0.08);
  }
  [data-theme="light"] .settings-input:focus,
  [data-theme="light"] .settings-select:focus {
    border-color: #0891b2;
    box-shadow: 0 0 0 3px rgba(8,145,178,0.15);
  }
  [data-theme="light"] .settings-radio-label {
    color: #0f172a;
  }
  [data-theme="light"] .settings-radio-label .radio-dot {
    border-color: #94a3b8;
  }
  [data-theme="light"] .settings-radio-label input[type="radio"]:checked + .radio-dot {
    border-color: #0891b2;
    background: #0891b2;
  }
  [data-theme="light"] .settings-radio-label input[type="radio"]:checked + .radio-dot::after {
    background: #fff;
  }
  [data-theme="light"] .settings-save-btn {
    background: linear-gradient(135deg, #0891b2, #0d9488);
    color: #fff;
  }
  [data-theme="light"] .settings-save-btn:hover {
    box-shadow: 0 0 24px rgba(8,145,178,0.3);
  }
  [data-theme="light"] .integration-card {
    background: rgba(255,255,255,0.6);
    border-color: rgba(0,0,0,0.06);
  }
  [data-theme="light"] .integration-card.warning {
    border-color: rgba(255,154,77,0.3);
    background: rgba(255,154,77,0.06);
  }
  [data-theme="light"] .integration-configure-btn {
    background: rgba(255,255,255,0.8);
    border-color: rgba(0,0,0,0.08);
    color: #0f172a;
  }
  [data-theme="light"] .integration-configure-btn:hover {
    background: #ffffff;
    border-color: #0891b2;
    color: #0891b2;
  }

  /* ─── BASE RESET ─── */
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html, body {
    height: 100%;
    width: 100%;
    background: var(--bg-0);
    color: var(--text-hi);
    font-family: var(--font-display);
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  body {
    background:
      radial-gradient(ellipse 1200px 700px at 12% -10%, rgba(6,182,212,0.08), transparent 60%),
      radial-gradient(ellipse 900px 600px at 95% 10%, rgba(255,154,77,0.06), transparent 55%),
      linear-gradient(180deg, rgba(8,10,14,0.55) 0%, rgba(6,8,11,0.78) 100%),
      url("../assets/bg-cityy.png");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    background-repeat: no-repeat;
    position: relative;
  }

  .app {
    display: flex;
    height: 100vh;
    width: 100%;
    overflow: hidden;
    position: relative;
    z-index: 1;
  }

  /* ─── ANIMATED GRID BACKGROUND ─── */
  @keyframes gridPulse {
    0%, 100% { opacity: 0.08; }
    50% { opacity: 0.15; }
  }

  @keyframes dotPulse {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 0.8; transform: scale(1.5); }
  }

  .grid-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  .grid-bg .grid-lines {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(6,182,212,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(6,182,212,0.06) 1px, transparent 1px);
    background-size: 48px 48px;
    animation: gridPulse 4s ease-in-out infinite;
  }

  .grid-bg .grid-dots {
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(circle at 22% 18%, rgba(6,182,212,0.08) 0%, transparent 15%),
      radial-gradient(circle at 35% 45%, rgba(6,182,212,0.06) 0%, transparent 20%),
      radial-gradient(circle at 65% 55%, rgba(6,182,212,0.08) 0%, transparent 15%),
      radial-gradient(circle at 80% 30%, rgba(6,182,212,0.06) 0%, transparent 20%),
      radial-gradient(circle at 92% 70%, rgba(6,182,212,0.08) 0%, transparent 15%);
    animation: dotPulse 6s ease-in-out infinite;
  }

  [data-theme="light"] .grid-bg .grid-lines {
    background-image:
      linear-gradient(rgba(8,145,178,0.08) 1px, transparent 1px),
      linear-gradient(90deg, rgba(8,145,178,0.08) 1px, transparent 1px);
  }

  [data-theme="light"] .grid-bg .grid-dots {
    background-image:
      radial-gradient(circle at 22% 18%, rgba(8,145,178,0.10) 0%, transparent 15%),
      radial-gradient(circle at 35% 45%, rgba(8,145,178,0.08) 0%, transparent 20%),
      radial-gradient(circle at 65% 55%, rgba(8,145,178,0.10) 0%, transparent 15%),
      radial-gradient(circle at 80% 30%, rgba(8,145,178,0.08) 0%, transparent 20%),
      radial-gradient(circle at 92% 70%, rgba(8,145,178,0.10) 0%, transparent 15%);
  }

  /* ─── MAIN AREA ─── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }

  /* ─── TOPBAR ─── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    padding: 14px 24px;
    flex-shrink: 0;
    background: rgba(8,12,18,0.40);
    border-bottom: 1px solid var(--panel-border);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    position: relative;
  }
  .topbar::after {
    content: "";
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(6,182,212,0.18), transparent);
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .top-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 999px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--panel-border);
    color: var(--text-mid);
    font-size: 11px;
    cursor: pointer;
    transition: all .2s ease;
    font-family: var(--font-display);
  }
  .top-btn:hover {
    background: rgba(255,255,255,0.08);
    color: var(--text-hi);
    border-color: var(--panel-border-strong);
  }
  .top-btn .icon { font-size: 14px; }
  .top-btn .date-text {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-low);
  }
  .admin-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--cyan), #0891b2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 600;
    color: #0a0d12;
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 7px;
    font-family: var(--font-mono);
    font-size: 10.5px;
    letter-spacing: 0.5px;
    color: var(--cyan);
    background: var(--cyan-dim);
    border: 1px solid rgba(6,182,212,0.3);
    padding: 6px 12px;
    border-radius: 999px;
  }
  .dot-live {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--cyan);
    box-shadow: 0 0 8px var(--cyan);
    animation: pulse 1.8s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ─── SETTINGS LAYOUT ─── */
  .settings-wrapper {
    flex: 1;
    display: flex;
    overflow: hidden;
    padding: 16px 20px 20px;
    gap: 16px;
    min-height: 0;
  }

  .settings-layout {
    flex: 1;
    display: flex;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: var(--radius-lg);
    backdrop-filter: blur(22px);
    -webkit-backdrop-filter: blur(22px);
    box-shadow: 0 20px 50px -20px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.04);
    overflow: hidden;
    position: relative;
  }
  .settings-layout::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
  }

  /* ─── SETTINGS NAV ─── */
  .settings-nav {
    width: 180px;
    flex-shrink: 0;
    background: rgba(255,255,255,0.03);
    border-right: 1px solid var(--line);
    padding: 16px 8px;
    overflow-y: auto;
  }

  .settings-nav-header {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-low);
    padding: 0 8px 14px;
    font-family: var(--font-mono);
    border-bottom: 1px solid var(--line);
    margin-bottom: 8px;
  }

  .settings-nav-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-mid);
    cursor: pointer;
    transition: all .15s ease;
    border-right: 2px solid transparent;
    text-decoration: none;
    margin-bottom: 2px;
  }
  .settings-nav-item:hover {
    background: rgba(255,255,255,0.05);
    color: var(--text-hi);
  }
  .settings-nav-item.active {
    background: var(--cyan-dim);
    color: var(--cyan);
    border-right-color: var(--cyan);
  }
  .settings-nav-item .nav-icon {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
  }
  .settings-nav-item.active .nav-icon {
    color: var(--cyan);
  }

  /* ─── SETTINGS CONTENT ─── */
  .settings-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 0;
  }

  .settings-content-header {
    padding: 20px 28px 14px;
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
  }
  .settings-content-header h2 {
    font-size: 18px;
    font-weight: 700;
    color: var(--text-hi);
  }
  .settings-content-header p {
    font-size: 12px;
    color: var(--text-mid);
    margin-top: 2px;
  }

  .settings-content-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px 28px 24px;
  }
  .settings-content-body::-webkit-scrollbar { width: 4px; }
  .settings-content-body::-webkit-scrollbar-track { background: transparent; }
  .settings-content-body::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.08);
    border-radius: 4px;
  }

  /* ─── FORM FIELDS ─── */
  .settings-section {
    margin-bottom: 28px;
  }
  .settings-section:last-child {
    margin-bottom: 0;
  }

  .settings-section-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-hi);
    margin-bottom: 14px;
  }

  .settings-divider {
    border: none;
    border-top: 1px solid var(--line);
    margin: 16px 0 20px;
  }

  .settings-field {
    margin-bottom: 16px;
  }
  .settings-field:last-child {
    margin-bottom: 0;
  }

  .settings-label {
    display: block;
    font-size: 11.5px;
    font-weight: 600;
    color: var(--text-mid);
    margin-bottom: 4px;
  }

  .settings-description {
    font-size: 10.5px;
    color: var(--text-low);
    margin-top: 2px;
  }

  .settings-input,
  .settings-select {
    width: 100%;
    max-width: 420px;
    padding: 9px 14px;
    font-size: 12px;
    font-family: var(--font-display);
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--panel-border);
    border-radius: 8px;
    color: var(--text-hi);
    transition: all .2s ease;
    outline: none;
  }
  .settings-input:focus,
  .settings-select:focus {
    border-color: var(--cyan);
    box-shadow: 0 0 0 3px var(--cyan-dim);
  }
  .settings-input::placeholder {
    color: var(--text-low);
  }

  .settings-select {
    appearance: none;
    -webkit-appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0L5 6L10 0Z' fill='%239fb0bb'/></svg>");
    background-repeat: no-repeat;
    background-position: right 12px center;
    cursor: pointer;
    max-width: 300px;
  }

  /* ─── UPLOAD BUTTON ─── */
  .settings-upload {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    font-size: 11.5px;
    font-weight: 600;
    font-family: var(--font-display);
    color: var(--text-mid);
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--panel-border);
    border-radius: 8px;
    cursor: pointer;
    transition: all .2s ease;
  }
  .settings-upload:hover {
    background: rgba(255,255,255,0.10);
    color: var(--text-hi);
    border-color: var(--panel-border-strong);
  }
  .settings-upload input[type="file"] {
    display: none;
  }

  /* ─── RADIO GROUP ─── */
  .settings-radio-group {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    padding-top: 2px;
  }
  .settings-radio-label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-mid);
    cursor: pointer;
  }
  .settings-radio-label input[type="radio"] {
    display: none;
  }
  .settings-radio-label .radio-dot {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 2px solid var(--text-low);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all .2s ease;
  }
  .settings-radio-label .radio-dot::after {
    content: "";
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: transparent;
    transition: all .2s ease;
  }
  .settings-radio-label input[type="radio"]:checked + .radio-dot {
    border-color: var(--cyan);
    background: var(--cyan);
  }
  .settings-radio-label input[type="radio"]:checked + .radio-dot::after {
    background: #fff;
  }
  .settings-radio-label:hover .radio-dot {
    border-color: var(--cyan);
  }

  /* ─── SAVE BUTTON ─── */
  .settings-save-row {
    display: flex;
    justify-content: flex-end;
    padding-top: 20px;
    border-top: 1px solid var(--line);
    margin-top: 8px;
  }
  .settings-save-btn {
    padding: 10px 32px;
    font-size: 12px;
    font-weight: 600;
    font-family: var(--font-display);
    background: linear-gradient(135deg, var(--cyan), #0891b2);
    color: #0a0d12;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all .2s ease;
  }
  .settings-save-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 0 24px var(--cyan-glow);
  }

  /* ─── ENTERPRISE INTEGRATIONS STYLES ─── */
  .integrations-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--line);
    flex-wrap: wrap;
    gap: 12px;
  }

  .integrations-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-hi);
  }

  .integrations-subtitle {
    font-size: 12px;
    color: var(--text-mid);
    margin-top: 2px;
  }

  .integrations-count {
    font-size: 11px;
    color: var(--text-mid);
    font-family: var(--font-mono);
    background: var(--cyan-dim);
    padding: 6px 14px;
    border-radius: 999px;
    border: 1px solid rgba(6,182,212,0.15);
  }

  .integrations-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

<script>
  // ─── DATE & TIME ───
  function updateDateTime() {
    const now = new Date();
    const options = { month: 'short', day: 'numeric', year: 'numeric' };
    document.getElementById('currentDate').textContent = now.toLocaleDateString('en-US', options);
    document.getElementById('currentTime').textContent = now.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' }) + ' UTC';
  }
  updateDateTime();
  setInterval(updateDateTime, 1000);

  // ─── THEME TOGGLE ───
  let currentTheme = 'light';

  function toggleTheme() {
    if (currentTheme === 'dark') {
      document.documentElement.setAttribute('data-theme', 'light');
      currentTheme = 'light';
      document.querySelector('.top-btn .icon').textContent = '☀️';
    } else {
      document.documentElement.removeAttribute('data-theme');
      currentTheme = 'dark';
      document.querySelector('.top-btn .icon').textContent = '🌙';
    }
  }
