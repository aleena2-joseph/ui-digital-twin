<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Management - Digital Twin Platform</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<!-- ═══ LUCIDE ICONS ═══ -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.1/lucide.min.js"></script>

<!-- ═══ SIDEBAR STYLES ═══ -->
<link rel="stylesheet" href="../sidebar.css">

<style>
  /* ─── SAME VARIABLES AS SETTINGS ─── */
  :root {
    --bg-0: #0a0d12;
    --panel: rgba(20,26,34,0.55);
    --panel-solid: #121821;
    --panel-border: rgba(255,255,255,0.08);
    --panel-border-strong: rgba(255,255,255,0.14);
    --cyan: #06b6d4;
    --cyan-dim: rgba(6,182,212,0.16);
    --cyan-glow: rgba(6,182,212,0.4);
    --orange: #ff9a4d;
    --orange-dim: rgba(255,154,77,0.16);
    --red: #ff5c5c;
    --green: #22c55e;
    --green-bg: rgba(34,197,94,0.12);
    --orange-bg: rgba(255,154,77,0.12);
    --text-hi: #eef3f5;
    --text-mid: #9fb0bb;
    --text-low: #5e6e79;
    --line: rgba(255,255,255,0.06);
    --radius-lg: 20px;
    --radius-md: 14px;
    --radius-sm: 10px;
    --font-display: 'Space Grotesk', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
    --sidebar-w: 240px;
  }

  /* ── LIGHT THEME ── */
  [data-theme="light"] {
    --bg-0: #e8edf2;
    --panel: rgba(255,255,255,0.70);
    --panel-solid: #ffffff;
    --panel-border: rgba(0,0,0,0.06);
    --panel-border-strong: rgba(0,0,0,0.12);
    --text-hi: #0f172a;
    --text-mid: #475569;
    --text-low: #94a3b8;
    --line: rgba(0,0,0,0.06);
    --cyan: #0891b2;
    --cyan-dim: rgba(8,145,178,0.10);
    --cyan-glow: rgba(8,145,178,0.2);
  }

  [data-theme="light"] body {
    background:
      radial-gradient(ellipse 1200px 700px at 12% -10%, rgba(8,145,178,0.04), transparent 60%),
      radial-gradient(ellipse 900px 600px at 95% 10%, rgba(255,154,77,0.03), transparent 55%),
      linear-gradient(180deg, rgba(232,237,242,0.30) 0%, rgba(232,237,242,0.50) 100%),
      url("../assets/bg-whitey.png");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    background-repeat: no-repeat;
  }

  [data-theme="light"] .topbar {
    background: rgba(255,255,255,0.55);
    border-bottom: 1px solid rgba(0,0,0,0.06);
    backdrop-filter: blur(16px);
  }
  [data-theme="light"] .topbar::after {
    background: linear-gradient(90deg, transparent, rgba(8,145,178,0.10), transparent);
  }
  [data-theme="light"] .top-btn {
    background: rgba(255,255,255,0.6);
    border: 1px solid rgba(0,0,0,0.06);
    color: #475569;
  }
  [data-theme="light"] .top-btn:hover {
    background: rgba(255,255,255,0.9);
    color: #0f172a;
    border-color: rgba(0,0,0,0.1);
  }
  [data-theme="light"] .top-btn .date-text { color: #94a3b8; }
  [data-theme="light"] .admin-avatar {
    background: linear-gradient(135deg, #0891b2, #0d9488);
    color: #fff;
  }
  [data-theme="light"] .status-pill {
    color: #0891b2;
    background: rgba(8,145,178,0.08);
    border-color: rgba(8,145,178,0.15);
  }
  [data-theme="light"] .dot-live {
    background: #0891b2;
    box-shadow: 0 0 8px rgba(8,145,178,0.4);
  }

  /* ─── BASE RESET ─── */
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html, body {
    height: 100%;
    width: 100%;
    background: var(--bg-0);
    color: var(--text-hi);
    font-family: var(--font-display);
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  body {
    background:
      radial-gradient(ellipse 1200px 700px at 12% -10%, rgba(6,182,212,0.08), transparent 60%),
      radial-gradient(ellipse 900px 600px at 95% 10%, rgba(255,154,77,0.06), transparent 55%),
      linear-gradient(180deg, rgba(8,10,14,0.55) 0%, rgba(6,8,11,0.78) 100%),
      url("../assets/bg-cityy.png");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    background-repeat: no-repeat;
    position: relative;
  }

  .app {
    display: flex;
    height: 100vh;
    width: 100%;
    overflow: hidden;
    position: relative;
    z-index: 1;
  }

  /* ─── ANIMATED GRID BACKGROUND ─── */
  @keyframes gridPulse {
    0%, 100% { opacity: 0.08; }
    50% { opacity: 0.15; }
  }

  @keyframes dotPulse {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 0.8; transform: scale(1.5); }
  }

  .grid-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  .grid-bg .grid-lines {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(6,182,212,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(6,182,212,0.06) 1px, transparent 1px);
    background-size: 48px 48px;
    animation: gridPulse 4s ease-in-out infinite;
  }

  .grid-bg .grid-dots {
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(circle at 22% 18%, rgba(6,182,212,0.08) 0%, transparent 15%),
      radial-gradient(circle at 35% 45%, rgba(6,182,212,0.06) 0%, transparent 20%),
      radial-gradient(circle at 65% 55%, rgba(6,182,212,0.08) 0%, transparent 15%),
      radial-gradient(circle at 80% 30%, rgba(6,182,212,0.06) 0%, transparent 20%),
      radial-gradient(circle at 92% 70%, rgba(6,182,212,0.08) 0%, transparent 15%);
    animation: dotPulse 6s ease-in-out infinite;
  }

  [data-theme="light"] .grid-bg .grid-lines {
    background-image:
      linear-gradient(rgba(8,145,178,0.08) 1px, transparent 1px),
      linear-gradient(90deg, rgba(8,145,178,0.08) 1px, transparent 1px);
  }

  [data-theme="light"] .grid-bg .grid-dots {
    background-image:
      radial-gradient(circle at 22% 18%, rgba(8,145,178,0.10) 0%, transparent 15%),
      radial-gradient(circle at 35% 45%, rgba(8,145,178,0.08) 0%, transparent 20%),
      radial-gradient(circle at 65% 55%, rgba(8,145,178,0.10) 0%, transparent 15%),
      radial-gradient(circle at 80% 30%, rgba(8,145,178,0.08) 0%, transparent 20%),
      radial-gradient(circle at 92% 70%, rgba(8,145,178,0.10) 0%, transparent 15%);
  }

  /* ─── MAIN AREA ─── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }

  /* ─── TOPBAR ─── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    padding: 14px 24px;
    flex-shrink: 0;
    background: rgba(8,12,18,0.40);
    border-bottom: 1px solid var(--panel-border);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    position: relative;
  }
  .topbar::after {
    content: "";
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(6,182,212,0.18), transparent);
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .top-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 999px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--panel-border);
    color: var(--text-mid);
    font-size: 11px;
    cursor: pointer;
    transition: all .2s ease;
    font-family: var(--font-display);
  }
  .top-btn:hover {
    background: rgba(255,255,255,0.08);
    color: var(--text-hi);
    border-color: var(--panel-border-strong);
  }
  .top-btn .icon { font-size: 14px; }
  .top-btn .date-text {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-low);
  }
  .admin-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--cyan), #0891b2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 600;
    color: #0a0d12;
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 7px;
    font-family: var(--font-mono);
    font-size: 10.5px;
    letter-spacing: 0.5px;
    color: var(--cyan);
    background: var(--cyan-dim);
    border: 1px solid rgba(6,182,212,0.3);
    padding: 6px 12px;
    border-radius: 999px;
  }
  .dot-live {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--cyan);
    box-shadow: 0 0 8px var(--cyan);
    animation: pulse 1.8s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ─── USER MANAGEMENT LAYOUT ─── */
  .um-wrapper {
    flex: 1;
    display: flex;
    overflow: hidden;
    padding: 16px 20px 20px;
    gap: 16px;
    min-height: 0;
  }

  .um-layout {
    flex: 1;
    display: flex;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: var(--radius-lg);
    backdrop-filter: blur(22px);
    -webkit-backdrop-filter: blur(22px);
    box-shadow: 0 20px 50px -20px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.04);
    overflow: hidden;
    position: relative;
  }
  .um-layout::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
  }

  /* ─── USER MANAGEMENT NAV ─── */
  .um-nav {
    width: 200px;
    flex-shrink: 0;
    background: rgba(255,255,255,0.03);
    border-right: 1px solid var(--line);
    padding: 16px 8px;
    overflow-y: auto;
  }

  .um-nav-header {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-low);
    padding: 0 8px 14px;
    font-family: var(--font-mono);
    border-bottom: 1px solid var(--line);
    margin-bottom: 8px;
  }

  .um-nav-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-mid);
    cursor: pointer;
    transition: all .15s ease;
    border-right: 2px solid transparent;
    text-decoration: none;
    margin-bottom: 2px;
    width: 100%;
    background: none;
    border-left: none;
    border-top: none;
    border-bottom: none;
    font-family: var(--font-display);
    text-align: left;
  }
  .um-nav-item:hover {
    background: rgba(255,255,255,0.05);
    color: var(--text-hi);
  }
  .um-nav-item.active {
    background: var(--cyan-dim);
    color: var(--cyan);
    border-right-color: var(--cyan);
  }
  .um-nav-item .nav-icon {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
  }
  .um-nav-item.active .nav-icon {
    color: var(--cyan);
  }

  /* ─── USER MANAGEMENT CONTENT ─── */
  .um-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 0;
    min-width: 0;
  }

  .um-content-header {
    padding: 20px 28px 14px;
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
  }
  .um-content-header h2 {
    font-size: 18px;
    font-weight: 700;
    color: var(--text-hi);
  }
  .um-content-header p {
    font-size: 12px;
    color: var(--text-mid);
    margin-top: 2px;
  }
  .um-header-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .um-content-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px 28px 24px;
  }
  .um-content-body::-webkit-scrollbar { width: 4px; }
  .um-content-body::-webkit-scrollbar-track { background: transparent; }
  .um-content-body::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.08);
    border-radius: 4px;
  }

  /* ─── DASHBOARD STATS ─── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--panel-border);
    border-radius: 10px;
    padding: 16px 18px;
    text-align: center;
  }
  .stat-card .stat-value {
    font-size: 28px;
    font-weight: 700;
    color: var(--text-hi);
  }
  .stat-card .stat-label {
    font-size: 11px;
    color: var(--text-mid);
    margin-top: 4px;
  }
  .stat-card .stat-change {
    font-size: 10px;
    margin-top: 4px;
    display: inline-block;
    padding: 2px 8px;
    border-radius: 999px;
  }
  .stat-card .stat-change.up {
    color: var(--green);
    background: var(--green-bg);
  }
  .stat-card .stat-change.down {
    color: var(--red);
    background: rgba(255,92,92,0.12);
  }

  /* ─── RECENT ACTIVITY ─── */
  .activity-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-top: 8px;
  }
  .activity-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: rgba(255,255,255,0.02);
    border-radius: 8px;
    border-left: 3px solid var(--cyan);
  }
  .activity-item .activity-icon {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    background: var(--cyan-dim);
    color: var(--cyan);
  }
  .activity-item .activity-text {
    flex: 1;
    font-size: 12px;
    color: var(--text-mid);
  }
  .activity-item .activity-text strong {
    color: var(--text-hi);
  }
  .activity-item .activity-time {
    font-size: 10px;
    color: var(--text-low);
    font-family: var(--font-mono);
  }

  .quick-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 16px;
  }
  .quick-action-btn {
    padding: 8px 16px;
    font-size: 12px;
    font-weight: 600;
    font-family: var(--font-display);
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--panel-border);
    border-radius: 8px;
    color: var(--text-mid);
    cursor: pointer;
    transition: all .2s ease;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .quick-action-btn:hover {
    background: rgba(255,255,255,0.10);
    color: var(--text-hi);
    border-color: var(--panel-border-strong);
  }
  .quick-action-btn.primary {
    background: var(--cyan-dim);
    color: var(--cyan);
    border-color: rgba(6,182,212,0.2);
  }
  .quick-action-btn.primary:hover {
    background: var(--cyan);
    color: #0a0d12;
  }

  /* ─── USER TABLE ─── */
  .um-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 16px;
  }

  .um-search {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    flex: 1;
    min-width: 200px;
  }

  .um-search-input {
    padding: 8px 14px;
    font-size: 12px;
    font-family: var(--font-display);
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--panel-border);
    border-radius: 8px;
    color: var(--text-hi);
    outline: none;
    transition: all .2s ease;
    flex: 1;
    min-width: 150px;
  }
  .um-search-input:focus {
    border-color: var(--cyan);
    box-shadow: 0 0 0 3px var(--cyan-dim);
  }
  .um-search-input::placeholder {
    color: var(--text-low);
  }

  .um-filter-select {
    padding: 8px 12px;
    font-size: 11px;
    font-family: var(--font-display);
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--panel-border);
    border-radius: 8px;
    color: var(--text-mid);
    outline: none;
    cursor: pointer;
    transition: all .2s ease;
  }
  .um-filter-select:focus {
    border-color: var(--cyan);
  }

  .um-add-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 18px;
    font-size: 12px;
    font-weight: 600;
    font-family: var(--font-display);
    background: linear-gradient(135deg, var(--cyan), #0891b2);
    color: #0a0d12;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all .2s ease;
    white-space: nowrap;
  }
  .um-add-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 0 20px var(--cyan-glow);
  }

  .table-container {
    overflow-x: auto;
    margin-top: 4px;
  }

  .um-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }

  .um-table thead th {
    text-align: left;
    padding: 10px 12px;
    color: var(--text-low);
    font-weight: 600;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--line);
    white-space: nowrap;
  }

  .um-table tbody td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--line);
    vertical-align: middle;
  }

  .um-table tbody tr:hover {
    background: rgba(255,255,255,0.03);
  }

  .user-cell {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .user-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    font-size: 12px;
    flex-shrink: 0;
    background: var(--cyan-dim);
    color: var(--cyan);
  }

  .user-name {
    font-weight: 600;
    color: var(--text-hi);
  }
  .user-email {
    font-size: 11px;
    color: var(--text-mid);
  }

  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 2px 10px;
    border-radius: 999px;
    font-size: 10px;
    font-weight: 500;
  }
  .status-badge.active {
    color: var(--green);
    background: var(--green-bg);
  }
  .status-badge.inactive {
    color: var(--text-low);
    background: rgba(255,255,255,0.04);
  }
  .status-badge.pending {
    color: var(--orange);
    background: var(--orange-bg);
  }

  .status-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    display: inline-block;
  }
  .status-badge.active .status-dot { background: var(--green); }
  .status-badge.inactive .status-dot { background: var(--text-low); }
  .status-badge.pending .status-dot { background: var(--orange); }

  .action-btns {
    display: flex;
    gap: 4px;
  }

  .action-btn-icon {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: var(--text-mid);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: all .2s ease;
  }
  .action-btn-icon:hover {
    background: rgba(255,255,255,0.06);
    color: var(--text-hi);
  }
  .action-btn-icon.edit:hover { color: var(--cyan); }
  .action-btn-icon.delete:hover { color: var(--red); }
  .action-btn-icon.disable:hover { color: var(--orange); }

  /* ─── GROUPS & ROLES CARDS ─── */
  .gr-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  .gr-column {
    display: flex;
    flex-direction: column;
  }
  .gr-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .gr-header h3 {
    font-size: 14px;
    font-weight: 700;
    color: var(--text-hi);
  }

  .gr-card-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .gr-card {
    display: flex;
    justify-content: space-between;
    align-items: center;

  /* ─── TOAST ─── */

.settings-select {

  -webkit-appearance: none;

}

/* Toggle Switch */
.settings-toggle {
  display: flex;
  align-items: center;
  gap: 12px;
  padding-top: 4px;
}
.settings-toggle .toggle-track {
  position: relative;
  display: inline-block;
  width: 44px;
  height: 24px;
  flex-shrink: 0;
  cursor: pointer;
}
.settings-toggle .toggle-track input {
  opacity: 0;
  width: 0;
  height: 0;
}
.settings-toggle .toggle-track .toggle-slider {
  position: absolute;
  cursor: pointer;
  inset: 0;
  background: var(--text-low);
  border-radius: 12px;
  transition: all .3s ease;
}
.settings-toggle .toggle-track .toggle-slider::before {
  content: '';
  position: absolute;
  height: 18px;
  width: 18px;
  left: 3px;
  bottom: 3px;
  background: #fff;
  border-radius: 50%;
  transition: all .3s ease;
}
.settings-toggle .toggle-track input:checked + .toggle-slider {
  background: var(--cyan);
}
.settings-toggle .toggle-track input:checked + .toggle-slider::before {
  transform: translateX(20px);
}
.settings-toggle .toggle-label {
  font-size: 12px;
  color: var(--text-mid);
}
</style>
</head>

<div class="grid-bg">
  <div class="grid-lines"></div>
  <div class="grid-dots"></div>
</div>

<div class="app">

  <!-- ═══ SIDEBAR (RENDERED BY JS) ═══ -->
  <div class="sidebar"></div>

  <!-- ═══ MAIN ═══ -->
  <div class="main">

    <!-- TOPBAR -->
    <div class="topbar">
      <div class="status-pill">
        <span class="dot-live"></span>
        <span style="font-family:var(--font-mono);font-size:9px;color:var(--text-low);margin-left:4px;">Latency 23ms</span>

        <button class="top-btn">
          <span class="date-text" id="currentDate"></span>

        </button>
      </div>

        <!-- LEFT NAV - RENDERED BY JS -->
        <nav class="um-nav" id="umNav"></nav>

        <!-- RIGHT CONTENT - DYNAMIC -->
        <div class="um-content">

          <!-- HEADER -->
          <div class="um-content-header" id="umHeader">
            <div>
              <h2 id="umTitle">Dashboard</h2>
              <p id="umDescription">Overview of user management</p>
            </div>
            <div class="um-header-actions" id="umActions"></div>
          </div>

          <!-- BODY -->
          <div class="um-content-body" id="umBody">
            <!-- Content loaded by user-management.js -->
          </div>

        </div>

      <h3 id="drawerTitle">User Details</h3>
      <p id="drawerSubtitle">View and manage user information</p>
    </div>
    <button class="modal-close" onclick="closeDrawer()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>

  <div class="drawer-body" id="drawerBody"></div>
</div>

  <span id="toastMessage">Saved successfully</span>
</div>

<!-- ═══════════════ JAVASCRIPT ═══════════════ -->

<script>
  // ─── DATE & TIME ───
  function updateDateTime() {
    const now = new Date();
    const options = { month: 'short', day: 'numeric', year: 'numeric' };
    document.getElementById('currentDate').textContent = now.toLocaleDateString('en-US', options);
    document.getElementById('currentTime').textContent = now.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' }) + ' UTC';
  }
  updateDateTime();
  setInterval(updateDateTime, 1000);

  // ─── THEME TOGGLE ───
  let currentTheme = 'light';

  function toggleTheme() {
    if (currentTheme === 'dark') {
      document.documentElement.setAttribute('data-theme', 'light');
      currentTheme = 'light';
      document.querySelector('.top-btn .icon').textContent = '☀️';
    } else {
      document.documentElement.removeAttribute('data-theme');
      currentTheme = 'dark';
      document.querySelector('.top-btn .icon').textContent = '🌙';
    }
  }
</script>

<!-- ═══ USER MANAGEMENT JS ═══ -->
<script src="user-management.js"></script>

<!-- ═══ SIDEBAR JS ═══ -->
<script src="../sidebar.js"></script>
